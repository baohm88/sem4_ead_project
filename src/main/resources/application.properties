## C?U H̀NH DATABASE
# Tên Database là 'news_db' theo SQL Dump
spring.datasource.url=jdbc:mariadb://localhost:3306/bot_test_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

## C?U H̀NH JPA/HIBERNATE
# Xem xét s? d?ng 'update' n?u b?n mu?n Spring t? ??ng c?p nh?t c?u trúc b?ng
# (ch? dùng 'create' ho?c 'create-drop' cho môi tr??ng phát tri?n)
spring.jpa.hibernate.ddl-auto=update

# Ngôn ng? SQL Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.show-sql=true

